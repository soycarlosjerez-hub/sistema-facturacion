<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .icon-bubble {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .icon-bubble i {
            font-size: 5rem;
            color: #2563eb;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon-bubble">
            <i class="bi bi-compass"></i>
        </div>
        <div class="error-code">404</div>
        <h2 class="fw-bold mb-2 mt-3">Página no encontrada</h2>
        <p class="text-muted mb-4">The route sistema-facturacion/login could not be found.</p>
        <a href="/" class="btn btn-primary rounded-pill px-4 fw-bold">
            <i class="bi bi-house-door me-1"></i> Ir al Inicio
        </a>
    </div>
</body>
</html>
