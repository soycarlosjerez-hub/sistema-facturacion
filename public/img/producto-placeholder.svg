    </g>
  </g>

  <text x="200" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#64748b">
    Sin imagen
  </text>
  <text x="200" y="348" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#94a3b8">
    Producto sin imagen disponible
  </text>
</svg>
